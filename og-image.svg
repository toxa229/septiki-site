<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#0d1f16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9668"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0d9668" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d9668" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9668"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="1200" y2="70" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="1200" y2="140" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="490" x2="1200" y2="490" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Glow circles -->
  <circle cx="1000" cy="100" r="300" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="200" fill="url(#glow)"/>

  <!-- Decorative dots -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="4" fill="#0d9668"/>
    <circle cx="1100" cy="530" r="4" fill="#0d9668"/>
    <circle cx="1050" cy="80" r="3" fill="#10b981"/>
    <circle cx="150" cy="550" r="3" fill="#10b981"/>
    <circle cx="80" cy="300" r="2" fill="#0d9668"/>
    <circle cx="1120" cy="300" r="2" fill="#0d9668"/>
  </g>

  <!-- Accent top line -->
  <rect x="80" y="0" width="1040" height="4" fill="url(#accent)"/>

  <!-- Icon box -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#badge)"/>
  <text x="116" y="127" font-family="Arial, sans-serif" font-size="36" fill="#fff" text-anchor="middle">💧</text>

  <!-- Company name -->
  <text x="80" y="220" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#fff" letter-spacing="-1">СептикПро</text>

  <!-- Tagline -->
  <text x="80" y="280" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="400" fill="url(#accent)" letter-spacing="0">Монтаж септиков под ключ в Орле</text>

  <!-- Description -->
  <text x="80" y="340" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9ca3af" letter-spacing="0.3">
    <tspan x="80" dy="0">Проектируем • Поставляем • Устанавливаем</tspan>
    <tspan x="80" dy="32">Гарантия 5 лет • Монтаж за 1 день • Бесплатный выезд</tspan>
  </text>

  <!-- Phone button style -->
  <rect x="80" y="420" width="320" height="56" rx="28" fill="url(#badge)"/>
  <text x="240" y="454" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">📞 +7 (920) 819-54-02</text>

  <!-- Website URL -->
  <text x="80" y="530" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6b7280" letter-spacing="0.5">septikpro57.ru</text>

  <rect x="1020" y="420" width="140" height="44" rx="22" fill="rgba(13,150,104,0.15)" stroke="rgba(13,150,104,0.3)" stroke-width="1"/>
  <text x="1090" y="447" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0d9668" text-anchor="middle">5 лет гарантии</text>
</svg>
